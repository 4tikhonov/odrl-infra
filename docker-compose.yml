version: '3'
services:
  oydid-test:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - REDIRECT_URI=${REDIRECT_URI}
    volumes:
      - .:/usr/src/app
    ports:
      - "8001:8001"
    environment:
      - QDRANT_HOST=qdrant
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - qdrant
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
